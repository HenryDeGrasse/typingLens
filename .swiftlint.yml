disabled_rules:
  - trailing_whitespace
  - todo
  - line_length

opt_in_rules:
  - empty_count
  - force_unwrapping
  - explicit_init
  - implicitly_unwrapped_optional
  - first_where
  - last_where
  - sorted_first_last
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - unused_import
  - unused_declaration
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - closure_spacing
  - operator_usage_whitespace
  - convenience_type
  - empty_collection_literal
  - empty_string

excluded:
  - .build
  - .swiftpm
  - apps/mac/build
  - swift/Packages/*/.build

force_cast: warning
force_try: warning
function_body_length:
  warning: 80
  error: 200
type_body_length:
  warning: 400
  error: 800
file_length:
  warning: 800
  error: 1500
cyclomatic_complexity:
  warning: 12
  error: 20
identifier_name:
  min_length: 2
  max_length:
    warning: 60
    error: 80

reporter: "xcode"
